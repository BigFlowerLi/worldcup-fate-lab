name: Update World Cup Scores

on:
  workflow_dispatch:
  schedule:
    - cron: "30 8 * * *"

permissions:
  contents: write

jobs:
  update-scores:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Update scores
        run: npm run update:scores

      - name: Verify build
        run: npm run build

      - name: Commit score updates
        run: |
          if [ -z "$(git status --porcelain src/data/tournament.ts src/data/knockout.json)" ]; then
            echo "No score changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/data/tournament.ts src/data/knockout.json
          git commit -m "chore: update world cup scores"
          git push
